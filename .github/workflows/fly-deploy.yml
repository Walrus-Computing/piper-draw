name: Main CI + Deploy

on:
  push:
    branches:
      - main

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run pytest

  gui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  deploy:
    needs: [ruff, pytest, gui]
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Probe production for HTTP 200
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" https://piper-draw.fly.dev/)
            if [ "$code" = "200" ]; then
              echo "OK: got 200"
              exit 0
            fi
            echo "attempt $i: got $code, retrying in 10s..."
            sleep 10
          done
          echo "FAIL: production never returned 200"
          exit 1
