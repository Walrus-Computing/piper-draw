name: GUI PR Checks

on:
  pull_request:
    branches:
      - dev

jobs:
  gui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: piper_draw/gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: piper_draw/gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run GUI lint
        run: npm run lint

      - name: Run GUI tests
        run: npm run test

      - name: Run GUI build
        run: npm run build
