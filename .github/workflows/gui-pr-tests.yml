name: GUI PR Checks

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  gui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run GUI lint
        run: npm run lint

      - name: Run GUI tests
        run: npm run test

      - name: Run GUI build
        run: npm run build

  slop-diff:
    # Warn-only gate per CEO plan PR 1.3 (E3). Flip to fail after the
    # warn-only window passes (owner: scheduled weekly /retro per E6).
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: gui
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run slop:diff against base
        run: npm run slop:diff -- "origin/${{ github.base_ref }}"
