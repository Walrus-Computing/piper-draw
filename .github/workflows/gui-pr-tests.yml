name: GUI PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  gui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: piper_draw/gui
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: piper_draw/gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run GUI tests
        run: npm run test

      - name: Run GUI build
        run: npm run build
