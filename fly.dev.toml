# Fly.io config for the piper-draw dev release (deploys from the `dev` branch).
# Mirrors fly.toml; only `app` differs.

app = "piper-draw-dev"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
